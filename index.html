<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>V12 Ultimate AI 주식 단타 분석</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<meta name="theme-color" content="#111827">

</head>

<body>

<div class="container">

    <header>

        <h1>📈 V12 Ultimate</h1>

        <p>AI 주식 단타 분석 시스템</p>

    </header>


    <section class="searchBox">

        <input
            id="stockCode"
            type="text"
            placeholder="종목코드 또는 종목명 입력">

        <div id="suggestions"></div>

        <button id="searchBtn">
            종목 조회
        </button>

    </section>


    <section class="priceArea">

        <h2 id="stockName">종목명</h2>

        <div class="price">

            <span id="price">0원</span>

        </div>

        <div class="change">

            등락률 :
            <span id="change">0%</span>

        </div>

        <div>

            거래량 :
            <span id="volume">0</span>

        </div>

    </section>


    <section class="scoreBox">

        <h2>AI 점수</h2>

        <div id="score">

            0점

        </div>

        <div id="recommend">

            분석 대기

        </div>

    </section>


    <section class="maBox">

        <table>

            <tr>

                <th>5일선</th>

                <td id="ma5">-</td>

            </tr>

            <tr>

                <th>20일선</th>

                <td id="ma20">-</td>

            </tr>

            <tr>

                <th>60일선</th>

                <td id="ma60">-</td>

            </tr>
<tr>

    <th>전환선</th>

    <td id="conversion">-</td>

</tr>

<tr>

    <th>기준선</th>

    <td id="base">-</td>

</tr>

<tr>

    <th>선행스팬 A</th>

    <td id="spanA">-</td>

</tr>

<tr>

    <th>선행스팬 B</th>

    <td id="spanB">-</td>

</tr>

<tr>

    <th>후행스팬</th>

    <td id="lagging">-</td>

</tr>
        </table>

    </section>


    <section class="chartArea">

        <canvas id="priceChart"></canvas>

    </section>


    <section class="messageBox">

        <h3>AI 분석</h3>

        <div id="analysis">

            종목을 조회하세요.

        </div>

    </section>

</div>


<script src="script.js"></script>


<script>

if ("serviceWorker" in navigator) {

    window.addEventListener(
        "load",
        function(){

            navigator.serviceWorker.register(
                "sw.js"
            )
            .then(
                function(){

                    console.log(
                        "V12 Ultimate PWA Service Worker 등록 완료"
                    );

                }
            )
            .catch(
                function(error){

                    console.log(
                        "Service Worker 등록 실패",
                        error
                    );

                }
            );

        }
    );

}

</script>

<!-- =====================================
     자동 단타 후보
===================================== -->

<div
    id="autoScanSection"
    class="auto-scan-section"
>

    <button
        id="scanBtn"
        onclick="scanStocks()"
    >
        🔍 오늘의 단타 후보 찾기
    </button>


    <div
        id="scanResult"
        class="scan-result"
    >

        <div class="scan-empty">

            버튼을 눌러
            오늘의 단타 후보를 찾아보세요.

        </div>

    </div>

</div>
</body>
</html>
